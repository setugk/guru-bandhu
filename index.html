// ── Lessons panel ──────────────────────────────────────────────────────────
function renderLessonsPanel(s) {
  const comps = s.compositions || [];
  const active = comps.filter(c=>c.status!=='completed').sort((a,b)=>b.dateAdded.localeCompare(a.dateAdded));
  const past   = comps.filter(c=>c.status==='completed').sort((a,b)=>b.dateAdded.localeCompare(a.dateAdded));

  document.getElementById('sd-bandish-active').innerHTML = active.length
    ? active.map(c=>bandishItemHTML(s.id,c)).join('')
    : `<p style="color:var(--text-muted);font-size:13px;padding:6px 0 10px;">No active compositions.</p>`;

  document.getElementById('past-count').textContent = `(${past.length})`;
  document.getElementById('sd-bandish-past').innerHTML = past.length ? past.map(c=>bandishItemHTML(s.id,c)).join('') : '';

  pastLessonsOpen = false;
  document.getElementById('sd-bandish-past').style.display = 'none';
  document.getElementById('past-chevron').classList.remove('open');
}

function bandishItemHTML(studentId, c) {
  return `
    <div class="bandish-item">
      <div class="bandish-item-left">
        <div class="bandish-name">${esc(c.name)}</div>
        <div class="bandish-date">${fmtDate(c.dateAdded)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
        <span class="badge badge-${c.status}">${c.status==='completed'?'Completed':'Learning'}</span>
        <button class="icon-btn" onclick="openBandishSheet('${studentId}','${c.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>`;
}

function togglePastLessons() {
  pastLessonsOpen = !pastLessonsOpen;
  document.getElementById('sd-bandish-past').style.display = pastLessonsOpen ? 'block' : 'none';
  document.getElementById('past-chevron').classList.toggle('open', pastLessonsOpen);
}

function renderDetailPayments(s) {
  const el = document.getElementById('sd-payments-list');
  const c  = studentCurrency(s);
  const ps = getPaymentStatus(s);

  let statusHTML;
  if (!ps.rate) {
    statusHTML = `<div class="pay-status-card na"><p style="font-size:13px;color:var(--text-3);">No fees set — edit student profile to add a per-class fee and payment cadence.</p></div>`;
  } else if (ps.dollarBalance > 0) {
    let label, subMsg;
    if (ps.isPastDue) {
      label  = 'Payment past due';
      subMsg = `${ps.completed} class${ps.completed!==1?'es':''} completed — payment was missed`;
    } else if (ps.owedClasses >= ps.cadence) {
      label  = 'Payment due';
      subMsg = `${ps.completed} class${ps.completed!==1?'es':''} completed`;
    } else if (ps.owedClasses > 0) {
      const moreNeeded = ps.cadence - ps.owedClasses;
      label  = 'Balance due';
      subMsg = `${c}${ps.dollarBalance.toLocaleString()} owed · payment due after ${moreNeeded === 1 ? 'next class' : `${moreNeeded} more classes`}`;
    } else {
      label  = 'Balance due';
      subMsg = `${c}${ps.totalCollected.toLocaleString()} received of ${c}${ps.totalAccrued.toLocaleString()} total`;
    }
    statusHTML = `
      <div class="pay-status-card due">
        <div style="font-size:12px;font-weight:600;color:#92400E;text-transform:uppercase;letter-spacing:0.4px;">${label}</div>
        <div style="font-size:26px;font-weight:700;color:#92400E;margin:4px 0;">${c}${ps.amountDue.toLocaleString()}</div>
        <div style="font-size:12px;color:#A16207;">${subMsg}</div>
        <button class="btn btn-primary" style="width:100%;margin-top:14px;" onclick="openPaySheet('${s.id}')">Mark paid</button>
      </div>`;
  } else {
    const overpaid = ps.rate ? Math.max(0, ps.totalCollected - ps.totalAccrued) : 0;
    const note = overpaid > 0
      ? `${c}${overpaid.toLocaleString()} overpaid · ${ps.completed} completed`
      : `${ps.completed} completed · ${c}${ps.totalCollected.toLocaleString()} received`;
    statusHTML = `
      <div class="pay-status-card ok">
        <div style="font-size:12px;font-weight:600;color:var(--success);text-transform:uppercase;letter-spacing:0.4px;">No balance due</div>
        <div style="font-size:13px;color:var(--text-3);margin-top:8px;">${note}</div>
      </div>`;
  }

  const payments = (s.payments||[]).slice().sort((a,b) => (b.paidDate||'').localeCompare(a.paidDate||''));
  const historyHTML = payments.length
    ? `<div class="lessons-section-head"><span class="lessons-section-title">Payment history</span></div>` +
      payments.map(p => {
        const pStatus = p.status || 'paid';
        const pCurr   = p.currency || c;
        return `<div class="class-history-item">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div style="font-size:14px;font-weight:500;">${pCurr}${(p.amount||0).toLocaleString()}</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${p.classesCount||0} class${(p.classesCount||0)!==1?'es':''} · ${p.paidDate ? fmtDate(p.paidDate) : '—'}</div>
            </div>
            <div style="display:flex;gap:4px;">
              <button class="sheet-hdr-btn" onclick="openPaySheet('${s.id}','${p.id}')" title="Edit payment">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="sheet-hdr-btn" onclick="deletePayment('${s.id}','${p.id}')" title="Delete payment" style="color:var(--danger,#ef4444);">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              </button>
            </div>
          </div>
          <div class="class-status-btns">
            <button class="class-status-btn${pStatus==='paid'?' paid':''}" onclick="togglePaymentStatus('${s.id}','${p.id}','paid')">Paid</button>
            <button class="class-status-btn${pStatus==='due'?' due':''}"  onclick="togglePaymentStatus('${s.id}','${p.id}','due')">Due</button>
          </div>
        </div>`;
      }).join('')
    : `<p style="font-size:13px;color:var(--text-muted);padding:6px 0;">No payments recorded yet.</p>`;

  el.innerHTML = statusHTML + historyHTML;
}

// ── Classes panel ─────────────────────────────────────────────────────────
function renderClassesPanel(s) {
  const upcomingEl = document.getElementById('sd-upcoming-classes');
  const historyEl  = document.getElementById('sd-class-history');
  const now = new Date();

  // Upcoming section: only future nextClass
  if (s.nextClass && new Date(s.nextClass.utcISO) >= now) {
    const guruTime  = `${fmtTimeInTZ(s.nextClass.utcISO, guruTZ)} ${tzAbbr(guruTZ)}`;
    const dateStr   = new Date(s.nextClass.utcISO).toLocaleDateString('en-US', { timeZone: guruTZ, weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    const stuLine   = s.timezone ? `<div style="font-size:13px;color:var(--text-3);margin-top:4px;">Student's local time: ${fmtTimeInTZ(s.nextClass.utcISO, s.timezone)} ${tzAbbr(s.timezone)}</div>` : '';
    const notesLine = s.nextClass.notes ? `<div style="font-size:13px;color:var(--text-muted);margin-top:3px;">${esc(s.nextClass.notes)}</div>` : '';
    upcomingEl.innerHTML = `
      <div class="lessons-section-head" style="margin-top:0;"><span class="lessons-section-title">Upcoming</span></div>
      <div style="background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;font-weight:600;">${guruTime}</div>
          <div style="font-size:13px;color:var(--text-3);margin-top:2px;">${dateStr} · ${s.nextClass.duration||60} min</div>
          ${stuLine}${notesLine}
        </div>
        <button onclick="openScheduleSheet('${s.id}',false)" title="Edit" style="flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text-muted);cursor:pointer;border-radius:50%;-webkit-tap-highlight-color:transparent;touch-action:manipulation;" onmouseenter="this.style.background='var(--bg-hover)'" onmouseleave="this.style.background='none'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>`;
  } else {
    upcomingEl.innerHTML = `
      <div class="lessons-section-head" style="margin-top:0;"><span class="lessons-section-title">Upcoming</span></div>
      <div style="text-align:center;padding:20px 0 10px;color:var(--text-muted);font-size:14px;">No upcoming class scheduled</div>`;
  }

  // Past classes: classHistory + any past nextClass, newest first
  const pastItems = (s.classHistory||[]).map(c => ({ ...c, _isNext: false }));
  if (s.nextClass && new Date(s.nextClass.utcISO) < now) {
    pastItems.push({ ...s.nextClass, _isNext: true });
  }
  pastItems.sort((a, b) => new Date(b.utcISO) - new Date(a.utcISO));

  const completedCount = pastItems.filter(c => c.status === 'completed').length;
  const missedCount    = pastItems.filter(c => c.status === 'missed').length;
  const summaryParts   = [];
  if (completedCount) summaryParts.push(`<span style="color:var(--success)">${completedCount} completed</span>`);
  if (missedCount)    summaryParts.push(`<span style="color:var(--danger,#ef4444)">${missedCount} missed</span>`);
  const summarySuffix  = summaryParts.length ? ` <span style="font-weight:400;font-size:11px;color:var(--text-muted);">· ${summaryParts.join(' · ')}</span>` : '';

  historyEl.innerHTML = `<div class="lessons-section-head"><span class="lessons-section-title">Past classes${summarySuffix}</span></div>`;

  if (!pastItems.length) {
    historyEl.innerHTML += `<p style="color:var(--text-muted);font-size:13px;padding:6px 0;">No past classes recorded yet.</p>`;
    return;
  }

  historyEl.innerHTML += pastItems.map(c => {
    const guruTime = fmtTimeInTZ(c.utcISO, guruTZ);
    const dateStr  = new Date(c.utcISO).toLocaleDateString('en-US', { timeZone: guruTZ, weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    const stuLine  = s.timezone ? `<br>${fmtTimeInTZ(c.utcISO, s.timezone)} ${tzAbbr(s.timezone)}` : '';
    const noteLine = c.notes ? ` · ${esc(c.notes)}` : '';
    const statusCls    = c.status || '';
    const otherStatus  = c.status === 'completed' ? 'missed' : 'completed';
    const otherLabel   = c.status === 'completed' ? '✗ Missed' : '✓ Completed';
    const markFn       = c._isNext ? `markNextClass` : `markHistoryClass`;
    const markArgs     = c._isNext ? `'${s.id}','completed'` : `'${s.id}','${c.id}','completed'`;
    const markArgsAlt  = c._isNext ? `'${s.id}','missed'`    : `'${s.id}','${c.id}','missed'`;
    const markArgsOther = c._isNext
      ? `'${s.id}','${otherStatus}'`
      : `'${s.id}','${c.id}','${otherStatus}'`;
    const cmpCls = c.status === 'completed' ? ' completed' : '';
    const misCls = c.status === 'missed'    ? ' missed'    : '';
    const cmpClick = c.status === 'completed' ? `markHistoryClass('${s.id}','${c.id}',null)` : `${markFn}(${markArgs})`;
    const misClick = c.status === 'missed'    ? `markHistoryClass('${s.id}','${c.id}',null)` : `${markFn}(${markArgsAlt})`;
    const statusBtns = `<div class="class-status-btns">
      <button class="class-status-btn${cmpCls}" onclick="${cmpClick}">✓ Completed</button>
      <button class="class-status-btn${misCls}" onclick="${misClick}">✗ Missed</button>
    </div>`;
    return `<div class="class-history-item">
      <div>
        <div style="font-size:14px;font-weight:500;">${guruTime}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${dateStr} · ${c.duration||60} min${noteLine}${stuLine}</div>
      </div>
      ${statusBtns}
    </div>`;
  }).join('');
}

function markNextClass(studentId, status) {
  const s = students.find(x => x.id === studentId);
  if (!s || !s.nextClass) return;
  if (!s.classHistory) s.classHistory = [];
  s.classHistory.push({ ...s.nextClass, id: uid(), status });
  s.nextClass = null;
  saveStudents();
  renderClassesPanel(s);
  renderDetailPayments(s);
  renderSchedule();
  if (currentTab === 'students') renderStudents(document.getElementById('search-input').value);
}

function markHistoryClass(studentId, classId, status) {
  const s = students.find(x => x.id === studentId);
  const c = (s?.classHistory||[]).find(x => x.id === classId);
  if (!c) return;
  c.status = status;
  saveStudents();
  renderClassesPanel(s);
  renderDetailPayments(s);
  if (currentTab === 'payments') renderPayments();
}

function cycleSchedStatus(studentId, histId, currentStatus, e) {
  e.stopPropagation();
  const next = currentStatus === null ? 'completed' : currentStatus === 'completed' ? 'missed' : null;
  if (histId) markHistoryClass(studentId, histId, next);
  else markNextClass(studentId, next);
}

function toggleSchedCard(el) {
  const key = el.dataset.key;
  const wasExpanded = el.classList.contains('expanded');

  // Collapse any open card
  const prev = document.querySelector('.class-slot.expanded');
  if (prev) {
    prev.classList.remove('expanded');
    const row = prev.querySelector('.class-actions');
    if (row) row.remove();
  }
  schedExpandedKey = null;

  if (wasExpanded) return;

  schedExpandedKey = key;
  el.classList.add('expanded');

  const sid       = el.dataset.sid;
  const isHistory = el.dataset.isHistory === 'true';
  const isPast    = isHistory || new Date(el.dataset.utc) < new Date();
  const histId    = el.dataset.histId || '';
  const status    = el.dataset.status || '';

  let actionsHTML;
  if (isPast) {
    const cmpCls = status === 'completed' ? ' action-completed' : '';
    const misCls = status === 'missed'    ? ' action-missed'    : '';
    actionsHTML = `<div class="class-actions">
      <button class="class-action-btn${cmpCls}" onclick="event.stopPropagation();markSchedStatus('${sid}','${histId}','completed',${isHistory})">✓ Completed</button>
      <button class="class-action-btn${misCls}" onclick="event.stopPropagation();markSchedStatus('${sid}','${histId}','missed',${isHistory})">✗ Missed</button>
      <button class="class-action-btn action-profile" onclick="event.stopPropagation();openDetail('${sid}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Student profile</button>
    </div>`;
  } else {
    actionsHTML = `<div class="class-actions">
      <button class="class-action-btn action-reschedule" onclick="event.stopPropagation();openScheduleSheet('${sid}',false)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>
      <button class="class-action-btn action-profile" onclick="event.stopPropagation();openDetail('${sid}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Student profile</button>
    </div>`;
  }
  el.insertAdjacentHTML('beforeend', actionsHTML);
}

function markSchedStatus(sid, histId, newStatus, isHistory) {
  schedExpandedKey = null;
  if (isHistory && histId) {
    const s = students.find(x => x.id === sid);
    const c = (s?.classHistory||[]).find(x => x.id === histId);
    if (!c) return;
    c.status = c.status === newStatus ? null : newStatus;
    saveStudents();
    renderClassesPanel(s);
    renderDetailPayments(s);
    if (currentTab === 'payments') renderPayments();
    renderSchedule();
  } else {
    markNextClass(sid, newStatus);
  }
}

// ── Schedule class sheet ───────────────────────────────────────────────────
// simple=true → create mode (student selector, no duration/notes)
// simple=false → full edit mode (student pre-selected, all fields)
function openScheduleSheet(studentId, simple) {
  schedulingStudentId = studentId;
  scheduleSimpleMode = simple;

  const s = studentId ? students.find(x=>x.id===studentId) : null;
  document.getElementById('sc-title').textContent = simple ? 'Schedule Class' : (s?.nextClass ? 'Edit Schedule' : 'Schedule Class');

  const isCreate = !studentId || simple;
  document.getElementById('sc-student-group').style.display = isCreate ? 'block' : 'none';
  document.getElementById('sc-student-label-group').style.display = isCreate ? 'none' : 'block';
  document.getElementById('sc-extra-fields').style.display = simple ? 'none' : 'block';
  document.getElementById('sc-fields').style.display = isCreate ? 'none' : 'block';
  document.getElementById('sc-time-label').textContent = `Class time (${tzAbbr(guruTZ)})`;

  if (isCreate) {
    // populate student dropdown; fields stay hidden until student picked
    const sel = document.getElementById('sc-student-select');
    sel.innerHTML = `<option value="">Select student…</option>` +
      students.filter(x=>!x.archived).map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
    sel.value = '';
    document.getElementById('sc-clear').style.display = 'none';
  } else {
    document.getElementById('sc-student-label').textContent = s?.name || '';
    if (s?.nextClass) {
      const {date,time} = utcToGuruLocal(s.nextClass.utcISO);
      document.getElementById('sc-date').value = date;
      document.getElementById('sc-time').value = time;
      document.getElementById('sc-duration').value = s.nextClass.duration||60;
      document.getElementById('sc-notes').value = s.nextClass.notes||'';
      document.getElementById('sc-clear').style.display = 'inline-flex';
    } else {
      document.getElementById('sc-date').value = guruToday();
      document.getElementById('sc-time').value = s?.classTime||'';
      document.getElementById('sc-duration').value = s?.classDuration||60;
      document.getElementById('sc-notes').value = '';
      document.getElementById('sc-clear').style.display = 'none';
    }
  }

  updateSchedulePreview();
  openSheet('schedule-class-sheet');
}

function getScheduleSid() {
  return schedulingStudentId || document.getElementById('sc-student-select').value || null;
}

function updateSchedulePreview() {
  const sid = getScheduleSid();
  const s = sid ? students.find(x=>x.id===sid) : null;
  const date = document.getElementById('sc-date').value;
  const time = document.getElementById('sc-time').value;

  const stuTimeEl = document.getElementById('sc-stu-time');
  const conflictBox = document.getElementById('sc-conflict');

  // Show student's local time as a hint below the time input (only if student has a different timezone)
  if (s && s.timezone && s.timezone !== guruTZ && date && time) {
    try {
      const utcISO = guruLocalToUTC(date, time);
      const stuTime = fmtTimeInTZ(utcISO, s.timezone);
      const firstName = s.name.split(' ')[0];
      stuTimeEl.textContent = `${firstName}'s time: ${stuTime} ${tzAbbr(s.timezone)}`;
      stuTimeEl.style.display = 'block';
    } catch { stuTimeEl.style.display = 'none'; }
  } else {
    stuTimeEl.style.display = 'none';
  }

  // Conflict detection
  if (!date || !time || !sid) { conflictBox.classList.remove('visible'); return; }
  try {
    const utcISO = guruLocalToUTC(date, time);
    const dur = scheduleSimpleMode ? (s?.classDuration||60) : (parseInt(document.getElementById('sc-duration').value)||60);
    const conflicts = checkConflict(sid, utcISO, dur);
    if (conflicts.length) {
      const names = conflicts.map(x=>`${esc(x.name)} at ${fmtTimeInTZ(x.nextClass.utcISO,guruTZ)}`).join(', ');
      conflictBox.innerHTML = `⚠ Conflicts with: ${names}`;
      conflictBox.classList.add('visible');
    } else {
      conflictBox.classList.remove('visible');
    }
  } catch { conflictBox.classList.remove('visible'); }
}

function saveScheduleClass() {
  const sid = getScheduleSid();
  if (!sid) return;
  const date = document.getElementById('sc-date').value;
  const time = document.getElementById('sc-time').value;
  if (!date || !time) return;

  const s = students.find(x=>x.id===sid);
  if (!s) return;

  if (s.nextClass && new Date(s.nextClass.utcISO) < new Date()) {
    // Past nextClass → archive to history for marking
    if (!s.classHistory) s.classHistory = [];
    s.classHistory.push({ ...s.nextClass, id: uid(), status: null });
  }

  const newUtcISO = guruLocalToUTC(date, time);
  const dur = scheduleSimpleMode ? (s.classDuration||60) : (parseInt(document.getElementById('sc-duration').value)||60);
  s.nextClass = {
    utcISO: newUtcISO,
    duration: dur,
    notes: document.getElementById('sc-notes').value.trim()
  };
  saveStudents();
  closeSheet('schedule-class-sheet');

  // Switch to Week view showing the newly scheduled class
  const newDateStr = utcToGuruDateStr(newUtcISO);
  const coords = dateToWeekCoords(newDateStr);
  schedMode = 'week';
  schedWeekOffset = coords.offset;
  schedWeekDay = coords.day;
  renderSchedule();
  if (currentTab==='students') renderStudents(document.getElementById('search-input').value);
  if (viewingStudentId === sid && document.getElementById('student-page').classList.contains('open')) {
    renderClassesPanel(s);
  }
}

function clearNextClass() {
  const s = students.find(x=>x.id===schedulingStudentId);
  if (!s) return;
  s.nextClass = null;
  saveStudents();
  closeSheet('schedule-class-sheet');
  renderSchedule();
  if (currentTab==='students') renderStudents(document.getElementById('search-input').value);
}

// ── Student form ───────────────────────────────────────────────────────────
function openStudentForm(id = null) {
  editingStudentId = id;
  document.getElementById('sf-title').textContent = id ? 'Edit Student' : 'Add Student';
  populateTZSelect('f-timezone', '');
  ['f-name','f-phone','f-email','f-lesson','f-notes'].forEach(fid=>document.getElementById(fid).value='');
  setFTime('');
  document.getElementById('f-duration').value = '60';
  document.getElementById('f-class-rate').value = '';
  document.getElementById('f-pay-cadence').value = '4';
  document.getElementById('f-currency').value = '₹';
  document.querySelectorAll('#f-days .day-chip').forEach(c=>c.classList.remove('selected'));

  if (id) {
    const s = students.find(x=>x.id===id);
    if (s) {
      document.getElementById('f-name').value = s.name||'';
      document.getElementById('f-phone').value = s.phone||'';
      document.getElementById('f-email').value = s.email||'';
      setFTime(s.classTime||'');
      document.getElementById('f-duration').value = s.classDuration||60;
      document.getElementById('f-class-rate').value = s.classRate||'';
      document.getElementById('f-pay-cadence').value = s.payEveryNClasses||4;
      document.getElementById('f-currency').value = s.currency||'₹';
      document.getElementById('f-lesson').value = s.currentLesson||'';
      document.getElementById('f-notes').value = s.notes||'';
      populateTZSelect('f-timezone', s.timezone||'');
      (s.classDays||[]).forEach(day=>document.querySelector(`#f-days [data-day="${day}"]`)?.classList.add('selected'));
    }
    const archiveBtn = document.getElementById('sf-archive-btn');
    archiveBtn.style.display = 'inline-flex';
    archiveBtn.textContent = students.find(x=>x.id===id)?.archived ? 'Unarchive' : 'Archive';
    document.getElementById('sf-danger-zone').style.display = 'block';
  } else {
    document.getElementById('sf-archive-btn').style.display = 'none';
    document.getElementById('sf-danger-zone').style.display = 'none';
  }
  openSheet('student-form-sheet');
}

function saveStudentForm() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const data = {
    name, phone: document.getElementById('f-phone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    timezone: document.getElementById('f-timezone').value,
    currency: document.getElementById('f-currency').value||'₹',
    classRate: parseFloat(document.getElementById('f-class-rate').value)||0,
    payEveryNClasses: parseInt(document.getElementById('f-pay-cadence').value)||4,
    classDays: [...document.querySelectorAll('#f-days .day-chip.selected')].map(c=>c.dataset.day),
    classTime: document.getElementById('f-time').value,
    classDuration: parseInt(document.getElementById('f-duration').value)||60,
    currentLesson: document.getElementById('f-lesson').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
  };
  if (editingStudentId) {
    const idx = students.findIndex(s=>s.id===editingStudentId);
    if (idx!==-1) students[idx] = {...students[idx], ...data};
  } else {
    students.push({...data, id:uid(), joinDate:new Date().toISOString().slice(0,10), payments:[], compositions:[], classHistory:[], nextClass:null, archived:false});
  }
  saveStudents();
  closeSheet('student-form-sheet');
  refreshAll();
  if (editingStudentId && viewingStudentId === editingStudentId && document.getElementById('student-page').classList.contains('open')) {
    openDetail(editingStudentId);
  }
}

function archiveStudent() {
  const s = students.find(x=>x.id===editingStudentId);
  if (!s) return;
  s.archived = !s.archived;
  if (s.archived && s.nextClass) s.nextClass = null;
  saveStudents();
  closeSheet('student-form-sheet');
  closeStudentPage();
  refreshAll();
}

function deleteStudent() {
  const s = students.find(x=>x.id===editingStudentId);
  if (!s) return;
  if (!confirm(`Permanently delete ${s.name}? All data will be lost.`)) return;
  students = students.filter(x=>x.id!==editingStudentId);
  saveStudents();
  closeAllSheets();
  closeStudentPage();
  refreshAll();
}

// ── Payment sheet ──────────────────────────────────────────────────────────
function openPaySheet(studentId, paymentId) {
  payStudentId  = studentId;
  payEditingId  = paymentId || null;
  const s  = students.find(x => x.id === studentId);
  const ps = s ? getPaymentStatus(s) : null;

  if (payEditingId) {
    // Edit mode — pre-fill from existing record
    const p = (s?.payments||[]).find(x => x.id === payEditingId);
    document.getElementById('ps-title').textContent = 'Edit Payment';
    const ctx = document.getElementById('p-context');
    ctx.innerHTML = '';
    ctx.style.display = 'none';
    document.getElementById('p-classes').value = p?.classesCount ?? '';
    document.getElementById('p-currency').value = p?.currency || studentCurrency(s) || '₹';
    document.getElementById('p-amount').value  = p?.amount ?? '';
    document.getElementById('p-date').value    = p?.paidDate || '';
  } else {
    // New payment mode
    const c = s ? studentCurrency(s) : '$';
    const classesDue = ps?.owedClasses || ps?.cadence || 4;
    document.getElementById('ps-title').textContent = s ? `${s.name} · Payment` : 'Payment';
    const ctxLines = ps ? [
      `${ps.completed} total completed · ${ps.paidClasses} paid for`,
      `${ps.owedClasses} unpaid class${ps.owedClasses!==1?'es':''}`,
    ] : [];
    const pCtx = document.getElementById('p-context');
    pCtx.style.display = ctxLines.length ? '' : 'none';
    pCtx.innerHTML = ctxLines.map(l=>`<div>${esc(l)}</div>`).join('');
    document.getElementById('p-classes').value = classesDue;
    document.getElementById('p-currency').value = c;
    document.getElementById('p-amount').value  = ps?.amountDue || '';
    document.getElementById('p-date').value    = new Date().toISOString().slice(0, 10);
  }
  openSheet('payment-sheet');
}

function savePayment() {
  const s = students.find(x => x.id === payStudentId);
  if (!s) return;
  const classesCount = parseInt(document.getElementById('p-classes').value) || 0;
  const amount    = parseFloat(document.getElementById('p-amount').value) || 0;
  const paidDate  = document.getElementById('p-date').value;
  const currency  = document.getElementById('p-currency').value || studentCurrency(s);

  if (payEditingId) {
    const p = (s.payments||[]).find(x => x.id === payEditingId);
    if (p) { p.classesCount = classesCount; p.amount = amount; p.paidDate = paidDate; p.currency = currency; }
  } else {
    if (!classesCount) return;
    if (!s.payments) s.payments = [];
    s.payments.push({ id: uid(), classesCount, amount, paidDate, status: 'paid', currency });
  }
  saveStudents();
  closeSheet('payment-sheet');
  renderDetailPayments(s);
  if (currentTab === 'payments') renderPayments();
}

function deletePayment(studentId, paymentId) {
  const s = students.find(x => x.id === studentId);
  if (!s) return;
  if (!confirm('Delete this payment record?')) return;
  s.payments = (s.payments||[]).filter(p => p.id !== paymentId);
  saveStudents();
  renderDetailPayments(s);
  if (currentTab === 'payments') renderPayments();
}

function togglePaymentStatus(studentId, paymentId, newStatus) {
  const s = students.find(x => x.id === studentId);
  const p = (s?.payments||[]).find(x => x.id === paymentId);
  if (!p || (p.status||'paid') === newStatus) return;
  const msg = newStatus === 'due'
    ? 'Mark this payment as due? It will be added back to the outstanding balance.'
    : 'Mark this payment as paid?';
  if (!confirm(msg)) return;
  p.status = newStatus;
  saveStudents();
  renderDetailPayments(s);
  if (currentTab === 'payments') renderPayments();
}

// ── Bandish sheet ──────────────────────────────────────────────────────────
function openBandishSheet(studentId, compId=null) {
  editingBandishStudentId = studentId;
  editingBandishId = compId;
  document.getElementById('bs-title').textContent = compId ? 'Edit Composition' : 'Add Composition';
  document.getElementById('bs-delete').style.display = compId ? 'inline-flex' : 'none';
  if (compId) {
    const s = students.find(x=>x.id===studentId);
    const c = (s?.compositions||[]).find(x=>x.id===compId);
    document.getElementById('bs-name').value = c?.name||'';
    document.getElementById('bs-status').value = c?.status||'learning';
  } else {
    document.getElementById('bs-name').value = '';
    document.getElementById('bs-status').value = 'learning';
  }
  openSheet('bandish-sheet');
}

function saveBandish() {
  const name = document.getElementById('bs-name').value.trim();
  if (!name) { document.getElementById('bs-name').focus(); return; }
  const s = students.find(x=>x.id===editingBandishStudentId);
  if (!s) return;
  if (!s.compositions) s.compositions=[];
  const status = document.getElementById('bs-status').value;
  if (editingBandishId) {
    const c = s.compositions.find(x=>x.id===editingBandishId);
    if (c) { c.name=name; c.status=status; }
  } else {
    s.compositions.push({id:uid(), name, dateAdded:new Date().toISOString().slice(0,10), status});
  }
  saveStudents();
  closeSheet('bandish-sheet');
  renderLessonsPanel(s);
}

function deleteBandish() {
  const s = students.find(x=>x.id===editingBandishStudentId);
  if (!s) return;
  s.compositions = (s.compositions||[]).filter(c=>c.id!==editingBandishId);
  saveStudents();
  closeSheet('bandish-sheet');
  renderLessonsPanel(s);
}

// ── Lesson notes ───────────────────────────────────────────────────────────
function saveLessonNotes() {
  const s = students.find(x=>x.id===viewingStudentId);
  if (!s) return;
  s.currentLesson = document.getElementById('sd-lesson').value.trim();
  s.notes = document.getElementById('sd-notes').value.trim();
  saveStudents();
  if (currentTab==='students') renderStudents(document.getElementById('search-input').value);
  if (currentTab==='schedule') renderSchedule();
}

// ── Settings ───────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('s-name').value = settings.teacherName||'';
  document.getElementById('s-week-start').value = String(settings.weekStartDay ?? 0);
  document.getElementById('s-tz-display').textContent = `${guruTZ.replace(/_/g,' ')} (${tzAbbr(guruTZ)})`;
  openSheet('settings-sheet');
}
function saveSettingsForm() {
  settings.teacherName = document.getElementById('s-name').value.trim();
  settings.weekStartDay = parseInt(document.getElementById('s-week-start').value, 10);
  saveSettings(); closeSheet('settings-sheet');
  renderSchedule();
}

// ── Sheet helpers ──────────────────────────────────────────────────────────
function openSheet(id)  {
  document.getElementById('overlay').classList.add('visible');
  const el = document.getElementById(id);
  el.classList.add('open');
  const body = el.querySelector('.sheet-body');
  if (body) body.scrollTop = 0;
}
function closeSheet(id) { document.getElementById(id).classList.remove('open'); if (!document.querySelectorAll('.sheet.open').length) document.getElementById('overlay').classList.remove('visible'); }
function closeAllSheets() { document.querySelectorAll('.sheet.open').forEach(s=>s.classList.remove('open')); document.getElementById('overlay').classList.remove('visible'); }
function openStudentPage()  { document.getElementById('student-page').classList.add('open'); }
function closeStudentPage() { document.getElementById('student-page').classList.remove('open'); }
function activatePanel(panelId) {
  document.querySelectorAll('#student-page .sheet-tab').forEach(t=>t.classList.toggle('active', t.dataset.panel===panelId));
  document.querySelectorAll('#student-page .tab-panel').forEach(p=>p.classList.toggle('active', p.id===`panel-${panelId}`));
  document.getElementById('sd-classes-footer').style.display = panelId === 'classes' ? 'block' : 'none';
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id===`view-${tab}`));
  document.getElementById('fab').style.display = (tab==='students' || tab==='schedule') ? 'flex' : 'none';
  if (tab==='schedule') renderSchedule();
  if (tab==='students') renderStudents(document.getElementById('search-input').value);
  if (tab==='payments') renderPayments();
}

function refreshAll() {
  renderStudents(document.getElementById('search-input').value);
  renderSchedule();
  if (currentTab==='payments') renderPayments();
}

// ── Swipe on schedule tab ──────────────────────────────────────────────────
let swipeStartX = null, swipeStartY = null;
const schedView = document.getElementById('view-schedule');
schedView.addEventListener('touchstart', e => {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}, {passive:true});
schedView.addEventListener('touchend', e => {
  if (swipeStartX===null) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = e.changedTouches[0].clientY - swipeStartY;
  swipeStartX = swipeStartY = null;
  if (Math.abs(dx) < 48 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
  if (schedMode === 'week') {
    if (dx < 0) {
      if (schedWeekDay < 6) { schedWeekDay++; } else { schedWeekOffset++; schedWeekDay = 0; }
    } else {
      if (schedWeekDay > 0) { schedWeekDay--; } else { schedWeekOffset--; schedWeekDay = 6; }
    }
    renderSchedule();
  } else if (schedMode === 'month') {
    if (dx < 0) { schedMonthOffset++; renderSchedule(); }
    else        { schedMonthOffset--; renderSchedule(); }
  }
}, {passive:true});

// ── Events ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
document.getElementById('fab').addEventListener('click', ()=>{
  if (currentTab === 'schedule') openScheduleSheet(null, true);
  else openStudentForm();
});
document.getElementById('settings-btn').addEventListener('click', openSettings);

document.getElementById('overlay').addEventListener('click', () => {
  const open = [...document.querySelectorAll('.sheet.open')];
  if (!open.length) return;
  open[open.length-1].classList.remove('open');
  if (!document.querySelectorAll('.sheet.open').length) document.getElementById('overlay').classList.remove('visible');
});

// Student form
document.getElementById('sf-close').addEventListener('click', ()=>closeSheet('student-form-sheet'));
document.getElementById('sf-cancel').addEventListener('click', ()=>closeSheet('student-form-sheet'));
document.getElementById('sf-save').addEventListener('click', saveStudentForm);
document.getElementById('sf-archive-btn').addEventListener('click', archiveStudent);
document.getElementById('sf-delete-btn').addEventListener('click', deleteStudent);
document.querySelectorAll('#f-days .day-chip').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('selected')));

// Student detail page
document.getElementById('sd-back').addEventListener('click', closeStudentPage);

document.getElementById('sd-save-lesson').addEventListener('click', saveLessonNotes);
document.getElementById('sd-add-bandish').addEventListener('click', ()=>openBandishSheet(viewingStudentId,null));
document.getElementById('sd-add-payment').addEventListener('click', ()=>openPaySheet(viewingStudentId));
document.getElementById('past-toggle-btn').addEventListener('click', togglePastLessons);
document.querySelectorAll('#student-page .sheet-tab').forEach(t=>t.addEventListener('click',()=>activatePanel(t.dataset.panel)));

// Schedule class
document.getElementById('sc-close').addEventListener('click', ()=>closeSheet('schedule-class-sheet'));
document.getElementById('sc-cancel').addEventListener('click', ()=>closeSheet('schedule-class-sheet'));
document.getElementById('sc-save').addEventListener('click', saveScheduleClass);
document.getElementById('sc-clear').addEventListener('click', clearNextClass);
['sc-date','sc-time','sc-duration'].forEach(id=>{
  const el = document.getElementById(id);
  if (el) { el.addEventListener('input', updateSchedulePreview); el.addEventListener('change', updateSchedulePreview); }
});
document.getElementById('sc-student-select').addEventListener('change', ()=>{
  const id = document.getElementById('sc-student-select').value;
  if (id) {
    document.getElementById('sc-fields').style.display = 'block';
    const s = students.find(x=>x.id===id);
    if (s) {
      document.getElementById('sc-date').value = guruToday();
      document.getElementById('sc-time').value = s.classTime || '';
      document.getElementById('sc-duration').value = s.classDuration || 60;
      document.getElementById('sc-notes').value = '';
    }
  } else {
    document.getElementById('sc-fields').style.display = 'none';
  }
  updateSchedulePreview();
});

// Usual time display in student form
const fTimeEl = document.getElementById('f-time');
fTimeEl.addEventListener('change', () => setFTime(fTimeEl.value));
fTimeEl.addEventListener('input',  () => setFTime(fTimeEl.value));

// Payment
document.getElementById('ps-close').addEventListener('click', ()=>closeSheet('payment-sheet'));
document.getElementById('ps-cancel').addEventListener('click', ()=>closeSheet('payment-sheet'));
document.getElementById('ps-save').addEventListener('click', savePayment);

// Bandish
document.getElementById('bs-close').addEventListener('click', ()=>closeSheet('bandish-sheet'));
document.getElementById('bs-cancel').addEventListener('click', ()=>closeSheet('bandish-sheet'));
document.getElementById('bs-save').addEventListener('click', saveBandish);
document.getElementById('bs-delete').addEventListener('click', deleteBandish);

// Settings
document.getElementById('stg-close').addEventListener('click', ()=>closeSheet('settings-sheet'));
document.getElementById('stg-save').addEventListener('click', saveSettingsForm);

// Search
document.getElementById('search-input').addEventListener('input', e=>renderStudents(e.target.value));

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  guruTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
  load();
  switchTab('schedule');
}

init();
